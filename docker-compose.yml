services:
    db:
        container_name: db
        image: postgres:18
        env_file: .env
        ports:
            - "${POSTGRES_PORT:-5432}:5432"
        volumes:
            - recipera_pgdata:/var/lib/postgresql
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

volumes:
    recipera_pgdata:
